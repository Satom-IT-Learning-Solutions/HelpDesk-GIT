name: Synchronisation du Dépôt

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère tout l'historique pour un push propre

      - name: Configurer Git
        run: |
          git config --global user.email "noreply"
          git config --global user.name "Thomas-TP"

      - name: Push vers le dépôt de destination
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          # Ajout du remote de destination avec le token d'authentification
          git remote add destination https://x-access-token:${SYNC_TOKEN}@github.com/Satom-IT-Learning-Solutions/HelpDesk-GIT.git
          
          # Force push pour s'assurer que les deux dépôts sont identiques
          git push destination master --force
